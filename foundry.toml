[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "lib"]
test = "test-foundry"
cache_path = "cache_forge"
solc = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200

remappings = [
  "@openzeppelin/=node_modules/@openzeppelin/",
]

[fuzz]
runs = 500

[invariant]
runs = 100
depth = 50
fail_on_revert = false
